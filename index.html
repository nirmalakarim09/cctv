<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">

<title>Dashboard CCTV Kota Ambon</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
#map {
    height: 500px;
    width: 100%;
}
</style>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="container-fluid px-0">

    <div class="row justify-content-center bg-image mx-1 mb-5">

        <div class="col-lg-11 py-5" id="map">

        </div>

    </div>

</div>


<script>

var map = L.map('map').setView(
    [-3.690387, 128.186579],
    13
);


// OpenStreetMap

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap'
    }
).addTo(map);


// Icon CCTV

const cctvIcon = L.icon({

    iconUrl: '/images/cctv.png',

    iconSize: [
        40,
        40
    ],

    iconAnchor: [
        20,
        40
    ],

    popupAnchor: [
        0,
        -40
    ]

});


// Data CCTV

const lokasi = [

{
    nama: "CCTV Satpol PP",

    lat: -3.690387,

    lng: 128.186579,

    stream:
    "https://arrivals-minutes-communication-provinces.trycloudflare.com/cctv03/index.m3u8?cookieCheck=1"
},


{
    nama: "CCTV Pelabuhan",

    lat: -3.692000,

    lng: 128.190000,

    stream:
    "https://arrivals-minutes-communication-provinces.trycloudflare.com/cctv02/index.m3u8?cookieCheck=1"
},


{
    nama: "CCTV Pasar",

    lat: -3.688500,

    lng: 128.184000,

    stream:
    "https://arrivals-minutes-communication-provinces.trycloudflare.com/cctv04/index.m3u8?cookieCheck=1"
}

];


// Simpan koneksi HLS

let hlsList = {};



// Buat marker CCTV

lokasi.forEach(function(item, index){


    let marker = L.marker(
        [
            item.lat,
            item.lng
        ],
        {
            icon:cctvIcon
        }
    )
    .addTo(map);



    marker.bindPopup(`

        <h5>${item.nama}</h5>

        <video

            id="video${index}"

            width="300"

            controls

            autoplay

            muted

            playsinline>

        </video>

    `);



    marker.on(
        'popupopen',
        function(){


            const video =
            document.getElementById(
                `video${index}`
            );


            if(Hls.isSupported()){


                // hapus koneksi lama

                if(hlsList[index]){

                    hlsList[index].destroy();

                }



                let hls =
                new Hls({

                    enableWorker:true

                });



                hlsList[index] = hls;



                hls.on(
                    Hls.Events.ERROR,
                    function(event,data){

                        console.log(
                            "HLS ERROR:",
                            item.nama,
                            data
                        );

                    }
                );



                hls.loadSource(
                    item.stream
                );


                hls.attachMedia(
                    video
                );



            }

            else if(
                video.canPlayType(
                    'application/vnd.apple.mpegurl'
                )
            ){

                video.src =
                item.stream;

            }


        }
    );



    marker.on(
        'popupclose',
        function(){

            if(hlsList[index]){

                hlsList[index].destroy();

                delete hlsList[index];

            }

        }
    );


});

</script>



<script src="js/cctv.js"></script>
<script src="js/app.js"></script>
<script src="js/modal.js"></script>


</body>

</html>
